name: build-extension
on:
  workflow_call:
    inputs:
      extension:
        required: true
        type: string
      ext_version:
        required: true
        type: string
      php_abi:
        required: true
        type: string
      os:
        required: true
        type: string
      arch:
        required: true
        type: string
      spec_hash:
        required: false
        type: string
        default: ''
      push:
        required: false
        type: boolean
        default: true
    outputs:
      digest:
        description: 'OCI digest of the pushed bundle (empty when push=false)'
        value: ${{ jobs.build.outputs.digest }}
      spec_hash:
        description: 'Echoed spec_hash for lockfile update'
        value: ${{ inputs.spec_hash }}

jobs:
  build:
    name: 'ext ${{ inputs.extension }} ${{ inputs.ext_version }} @ PHP ${{ inputs.php_abi }}'
    runs-on: ${{ inputs.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Install oras
        env:
          ORAS_ARCH: ${{ inputs.arch == 'aarch64' && 'arm64' || 'amd64' }}
        run: |
          curl -sSfLO "https://github.com/oras-project/oras/releases/download/v1.3.1/oras_1.3.1_linux_${ORAS_ARCH}.tar.gz"
          tar -xzf "oras_1.3.1_linux_${ORAS_ARCH}.tar.gz" -C /usr/local/bin oras

      - name: Resolve build_deps from catalog
        id: build_deps
        run: |
          deps=$(yq eval '.build_deps.linux // [] | join(" ")' catalog/extensions/${{ inputs.extension }}.yaml)
          echo "deps=${deps}" >> "$GITHUB_OUTPUT"

      - name: Build extension
        env:
          EXT_NAME: ${{ inputs.extension }}
          EXT_VERSION: ${{ inputs.ext_version }}
          PHP_ABI: ${{ inputs.php_abi }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          WORKSPACE: ${{ github.workspace }}
          BUILD_DEPS: ${{ steps.build_deps.outputs.deps }}
        run: ./builders/linux/build-ext.sh

      - name: Push to GHCR
        id: push
        if: ${{ inputs.push }}
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
          DIGEST=$(cat /tmp/bundle.tar.zst.sha256)
          TAG="${{ inputs.ext_version }}-${{ inputs.php_abi }}-${{ inputs.os }}-${{ inputs.arch }}"
          oras push \
            --disable-path-validation \
            "ghcr.io/${{ github.repository_owner }}/php-ext-${{ inputs.extension }}:${TAG}" \
            --artifact-type application/vnd.buildrush.php-ext.v1 \
            /tmp/bundle.tar.zst:application/vnd.oci.image.layer.v1.tar+zstd \
            /tmp/meta.json:application/vnd.buildrush.meta.v1+json
          echo "digest=sha256:$(echo -n "$DIGEST" | sed 's/^sha256://')" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@v3
        if: ${{ inputs.push }}
      - name: Sign bundle
        if: ${{ inputs.push }}
        run: |
          DIGEST=$(cat /tmp/bundle.tar.zst.sha256 | sed 's/^sha256://')
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/php-ext-${{ inputs.extension }}@sha256:${DIGEST}"

      - name: Upload bundle artifact (PR)
        if: ${{ !inputs.push }}
        uses: actions/upload-artifact@v7
        with:
          name: php-ext-${{ inputs.extension }}-${{ inputs.ext_version }}-${{ inputs.php_abi }}-${{ inputs.os }}-${{ inputs.arch }}
          path: |
            /tmp/bundle.tar.zst
            /tmp/meta.json
          retention-days: 3
