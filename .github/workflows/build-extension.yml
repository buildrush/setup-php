name: build-extension
on:
  workflow_call:
    inputs:
      extension:
        required: true
        type: string
      ext_version:
        required: true
        type: string
      php_abi:
        required: true
        type: string
      os:
        required: true
        type: string
      arch:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Install oras
        run: |
          curl -sSfLO "https://github.com/oras-project/oras/releases/download/v1.3.1/oras_1.3.1_linux_amd64.tar.gz"
          tar -xzf oras_1.3.1_linux_amd64.tar.gz -C /usr/local/bin oras

      - name: Build extension
        env:
          EXT_NAME: ${{ inputs.extension }}
          EXT_VERSION: ${{ inputs.ext_version }}
          PHP_ABI: ${{ inputs.php_abi }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          WORKSPACE: ${{ github.workspace }}
        run: ./builders/linux/build-ext.sh

      - name: Push to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
          DIGEST=$(cat /tmp/bundle.tar.zst.sha256)
          TAG="${{ inputs.ext_version }}-${{ inputs.php_abi }}-${{ inputs.os }}-${{ inputs.arch }}"
          oras push \
            "ghcr.io/${{ github.repository_owner }}/php-ext-${{ inputs.extension }}:${TAG}" \
            --artifact-type application/vnd.buildrush.php-ext.v1 \
            /tmp/bundle.tar.zst:application/vnd.oci.image.layer.v1.tar+zstd \
            /tmp/meta.json:application/vnd.buildrush.meta.v1+json

      - uses: sigstore/cosign-installer@v4
      - name: Sign bundle
        run: |
          DIGEST=$(cat /tmp/bundle.tar.zst.sha256)
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/php-ext-${{ inputs.extension }}@sha256:${DIGEST}"
