name: watch-runner-images
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Check runner images
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(curl -sSf "https://api.github.com/repos/actions/runner-images/releases/latest" \
            -H "Authorization: Bearer $GH_TOKEN" | jq -r .tag_name)
          CURRENT=$(cat .state/runner-images-tag.txt 2>/dev/null || echo "")
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "$LATEST" > .state/runner-images-tag.txt
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit state
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "buildrush-bot"
          git config user.email "bot@buildrush.dev"
          git add .state/
          git commit -m "chore: observed runner image update"
          git push
      - name: Dispatch ci.yml for rebuild
        if: steps.check.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          # force=false — runner-image updates don't invalidate existing
          # bundles on their own. ci.yml on main re-runs against the new
          # runner release so any drift surfaces; operators decide whether
          # to escalate to a force-rebuild via security-rebuild dispatch.
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              ref: 'main',
              inputs: { force: 'false' },
            });
            core.info('Dispatched ci.yml on main after observing runner-image update');
