name: plan-and-build
on:
  workflow_call:
    inputs:
      force:
        description: 'Force rebuild even if digests match'
        type: boolean
        default: false
      push:
        description: 'Push bundles to GHCR and update bundles.lock'
        type: boolean
        default: true

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

jobs:
  plan:
    uses: ./.github/workflows/plan.yml
    with:
      force: ${{ inputs.force }}

  build-php:
    needs: plan
    if: needs.plan.outputs.php_matrix != '{"include":[]}'
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJSON(needs.plan.outputs.php_matrix) }}
    uses: ./.github/workflows/build-php-core.yml
    with:
      version: ${{ matrix.version }}
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      ts: ${{ matrix.ts }}
      spec_hash: ${{ matrix.spec_hash }}
      push: ${{ inputs.push }}

  build-ext:
    needs: [plan, build-php]
    if: |
      always() &&
      needs.plan.result == 'success' &&
      needs.build-php.result != 'failure' &&
      needs.plan.outputs.ext_matrix != '{"include":[]}'
    strategy:
      fail-fast: false
      max-parallel: 30
      matrix: ${{ fromJSON(needs.plan.outputs.ext_matrix) }}
    uses: ./.github/workflows/build-extension.yml
    with:
      extension: ${{ matrix.extension }}
      ext_version: ${{ matrix.ext_version }}
      php_abi: ${{ matrix.php_abi }}
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      spec_hash: ${{ matrix.spec_hash }}
      push: ${{ inputs.push }}

  update-lock:
    needs: [plan, build-php, build-ext]
    if: |
      always() &&
      inputs.push &&
      needs.plan.result == 'success' &&
      needs.build-php.result != 'failure' &&
      needs.build-ext.result != 'failure'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read
    steps:
      - name: Refuse fork PRs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::warning::Fork PRs cannot auto-publish bundles. Ask a maintainer to label the PR 'safe-to-build' and re-run after review."
          exit 1
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Update and commit lockfile
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go run ./cmd/lockfile-update \
            -catalog ./catalog \
            -lockfile ./bundles.lock \
            -registry ghcr.io/${{ github.repository_owner }} \
            -commit

  compat-harness:
    needs: update-lock
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/compat-harness.yml
    secrets: inherit

  integration-test:
    needs: update-lock
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/integration-test.yml
    secrets: inherit
