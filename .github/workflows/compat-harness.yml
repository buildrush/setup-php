name: compat-harness
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build phpup
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Build binary
        run: |
          cp bundles.lock cmd/phpup/bundles.lock
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o phpup ./cmd/phpup
          rm -f cmd/phpup/bundles.lock
      - uses: actions/upload-artifact@v7
        with:
          name: phpup
          path: phpup
          retention-days: 1

  fixtures:
    name: Load fixtures
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.load.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: load
        run: |
          matrix=$(yq -o=json '{include: .fixtures}' test/compat/fixtures.yaml)
          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  ours:
    name: 'ours: ${{ matrix.name }}'
    needs: [build, fixtures]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.fixtures.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: phpup

      - name: Place binary in tool cache
        run: |
          mkdir -p "$RUNNER_TOOL_CACHE/buildrush-bin"
          cp phpup "$RUNNER_TOOL_CACHE/buildrush-bin/phpup"
          chmod +x "$RUNNER_TOOL_CACHE/buildrush-bin/phpup"

      - name: Snapshot env + PATH before setup-php
        run: |
          env > /tmp/env-before
          echo -n "$PATH" > /tmp/path-before

      - name: Setup PHP (ours)
        uses: ./
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ${{ matrix.extensions }}
          ini-values: ${{ matrix.ini-values }}
          coverage: ${{ matrix.coverage }}

      - name: Probe
        run: |
          chmod +x test/compat/probe.sh
          bash test/compat/probe.sh \
            /tmp/ours.json \
            /tmp/env-before \
            /tmp/path-before \
            test/compat/ini-keys.txt

      - uses: actions/upload-artifact@v7
        with:
          name: probe-ours-${{ matrix.name }}
          path: /tmp/ours.json
          retention-days: 1

  theirs:
    name: 'theirs: ${{ matrix.name }}'
    needs: [fixtures]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.fixtures.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Snapshot env + PATH before setup-php
        run: |
          env > /tmp/env-before
          echo -n "$PATH" > /tmp/path-before

      - name: Setup PHP (shivammathur/setup-php@<pinned-sha>)
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ${{ matrix.extensions }}
          ini-values: ${{ matrix.ini-values }}
          coverage: ${{ matrix.coverage }}

      - name: Probe
        run: |
          chmod +x test/compat/probe.sh
          bash test/compat/probe.sh \
            /tmp/theirs.json \
            /tmp/env-before \
            /tmp/path-before \
            test/compat/ini-keys.txt

      - uses: actions/upload-artifact@v7
        with:
          name: probe-theirs-${{ matrix.name }}
          path: /tmp/theirs.json
          retention-days: 1
