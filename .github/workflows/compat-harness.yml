name: compat-harness
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'catalog/**'
      - 'builders/**'
  push:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: 'Build phpup (${{ matrix.goarch }})'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Build binary
        run: |
          cp bundles.lock cmd/phpup/bundles.lock
          GOOS=linux GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -o phpup ./cmd/phpup
          rm -f cmd/phpup/bundles.lock
      - uses: actions/upload-artifact@v7
        with:
          name: phpup-${{ matrix.goarch }}
          path: phpup
          retention-days: 1

  fixtures:
    name: Load fixtures
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.load.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: load
        # Filter fixtures by (PHP version, arch) pairs present in bundles.lock
        # so a fixture referencing a not-yet-built combination (new PHP version
        # OR new arch) doesn't fail fast against an unresolvable lockfile entry.
        # Plan-and-build's harness call (after update-lock) reads the
        # freshly-committed lockfile and picks up the full set; the standalone
        # harness here only runs fixtures whose (version, arch) is already
        # buildable on the current ref.
        #
        # Fixtures default arch to 'x86_64' when the field is absent so existing
        # 50 x86_64 fixtures stay covered without schema churn.
        #
        # runner_os-specified fixtures (e.g. bare-jammy-<NN>) validate the
        # jammy-built bundles landing via BUILDER_OS=ubuntu-22.04. Those
        # bundles only exist after plan-and-build's post-merge rebuild.
        # Skip them in standalone (pull_request / push / workflow_dispatch)
        # invocations; include them via workflow_call from plan-and-build.
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          pairs_json=$(jq -c '[.bundles | keys[] | select(startswith("php:")) | capture("^php:(?<v>[^:]+):linux:(?<a>[^:]+):") | .v + "/" + .a] | unique' bundles.lock)
          matrix=$(yq -o=json '.fixtures' test/compat/fixtures.yaml \
            | jq --argjson p "$pairs_json" -c '{include: [.[] | select((.["php-version"] + "/" + (.arch // "x86_64")) as $pa | $p | index($pa))]}')
          if [ "$EVENT_NAME" != "workflow_call" ]; then
            matrix=$(echo "$matrix" | jq -c '{include: [.include[] | select((.runner_os // "") == "")]}')
          fi
          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  ours:
    name: 'ours: ${{ matrix.name }}'
    needs: [build, fixtures]
    runs-on: >-
      ${{ matrix.arch == 'aarch64'
          && (matrix.runner_os == 'ubuntu-22.04' && 'ubuntu-22.04-arm' || 'ubuntu-24.04-arm')
          || (matrix.runner_os == 'ubuntu-22.04' && 'ubuntu-22.04' || 'ubuntu-24.04') }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.fixtures.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: phpup-${{ matrix.arch == 'aarch64' && 'arm64' || 'amd64' }}

      - name: Place binary in tool cache
        run: |
          mkdir -p "$RUNNER_TOOL_CACHE/buildrush-bin"
          cp phpup "$RUNNER_TOOL_CACHE/buildrush-bin/phpup"
          chmod +x "$RUNNER_TOOL_CACHE/buildrush-bin/phpup"

      - name: Snapshot env + PATH before setup-php
        run: |
          env > /tmp/env-before
          echo -n "$PATH" > /tmp/path-before

      - name: Setup PHP (ours)
        uses: ./
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ${{ matrix.extensions }}
          ini-values: ${{ matrix.ini-values }}
          coverage: ${{ matrix.coverage }}
          ini-file: ${{ matrix['ini-file'] }}

      - name: Probe
        run: |
          chmod +x test/compat/probe.sh
          bash test/compat/probe.sh \
            /tmp/ours.json \
            /tmp/env-before \
            /tmp/path-before \
            test/compat/ini-keys.txt

      - uses: actions/upload-artifact@v7
        with:
          name: probe-ours-${{ matrix.name }}
          path: /tmp/ours.json
          retention-days: 1

  theirs:
    name: 'theirs: ${{ matrix.name }}'
    needs: [fixtures]
    runs-on: >-
      ${{ matrix.arch == 'aarch64'
          && (matrix.runner_os == 'ubuntu-22.04' && 'ubuntu-22.04-arm' || 'ubuntu-24.04-arm')
          || (matrix.runner_os == 'ubuntu-22.04' && 'ubuntu-22.04' || 'ubuntu-24.04') }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.fixtures.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Snapshot env + PATH before setup-php
        run: |
          env > /tmp/env-before
          echo -n "$PATH" > /tmp/path-before

      - name: Setup PHP (shivammathur/setup-php@<pinned-sha>)
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ${{ matrix.extensions }}
          ini-values: ${{ matrix.ini-values }}
          coverage: ${{ matrix.coverage }}
          ini-file: ${{ matrix['ini-file'] }}

      - name: Probe
        run: |
          chmod +x test/compat/probe.sh
          bash test/compat/probe.sh \
            /tmp/theirs.json \
            /tmp/env-before \
            /tmp/path-before \
            test/compat/ini-keys.txt

      - uses: actions/upload-artifact@v7
        with:
          name: probe-theirs-${{ matrix.name }}
          path: /tmp/theirs.json
          retention-days: 1

  diff:
    name: 'diff: ${{ matrix.name }}'
    needs: [fixtures, ours, theirs]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.fixtures.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: actions/download-artifact@v8
        with:
          name: probe-ours-${{ matrix.name }}
          path: probes/ours

      - uses: actions/download-artifact@v8
        with:
          name: probe-theirs-${{ matrix.name }}
          path: probes/theirs

      - name: Run compat-diff
        run: |
          go run ./cmd/compat-diff \
            --ours probes/ours/ours.json \
            --theirs probes/theirs/theirs.json \
            --allowlist docs/compat-matrix.md \
            --fixture '${{ matrix.name }}'

  compat-gate:
    name: compat-harness gate
    if: always()
    needs: [build, fixtures, ours, theirs, diff]
    runs-on: ubuntu-24.04
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
