name: compat-harness
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build phpup
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Build binary
        run: |
          cp bundles.lock cmd/phpup/bundles.lock
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o phpup ./cmd/phpup
          rm -f cmd/phpup/bundles.lock
      - uses: actions/upload-artifact@v7
        with:
          name: phpup
          path: phpup
          retention-days: 1

  fixtures:
    name: Load fixtures
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.load.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: load
        run: |
          matrix=$(yq -o=json '{include: .fixtures}' test/compat/fixtures.yaml)
          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
