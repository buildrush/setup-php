name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass the spec-hash cache-probe and rebuild every bundle from source. Used by security-rebuild and manual full-rebuild dispatches; leave unchecked for a routine run."
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Prepare embedded lockfile
        run: cp bundles.lock cmd/phpup/bundles.lock
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - name: go vet
        run: go vet ./...
      - name: Install node deps
        run: npm ci
      - name: ESLint
        run: npx eslint src/ test/
      - name: Prettier
        run: npx prettier --check src/ test/
      - name: go mod tidy check
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod / go.sum drift — run 'go mod tidy' locally" >&2
            git diff go.mod go.sum
            exit 1
          fi
      - name: gofmt check
        run: |
          fmt_out=$(gofmt -s -l .)
          if [ -n "$fmt_out" ]; then
            echo "gofmt -s drift in:" >&2
            echo "$fmt_out" >&2
            exit 1
          fi

  unit:
    name: Unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Prepare embedded lockfile
        run: cp bundles.lock cmd/phpup/bundles.lock
      - name: Install node deps
        run: npm ci
      - run: make test test-node

  pipeline:
    name: "Pipeline ${{ matrix.os }}/${{ matrix.arch }} PHP ${{ matrix.php }}"
    needs: [lint, unit]
    strategy:
      fail-fast: false
      matrix:
        os:   [jammy, noble]
        arch: [x86_64, aarch64]
        php:  ["8.1", "8.2", "8.3", "8.4", "8.5"]
    runs-on: >-
      ${{ matrix.arch == 'aarch64'
          && (matrix.os == 'jammy' && 'ubuntu-22.04-arm' || 'ubuntu-24.04-arm')
          || (matrix.os == 'jammy' && 'ubuntu-22.04' || 'ubuntu-24.04') }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Restore oci-layout cache
        uses: actions/cache@v4
        with:
          path: |
            out/oci-layout
            .cache/phpup-build
          key: phpup-ci-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.php }}-${{ hashFiles('builders/**', 'catalog/**') }}
          restore-keys: |
            phpup-ci-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.php }}-
      - name: Run ci-cell (build + test)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # workflow_dispatch threads `inputs.force` through so a manual
          # full-rebuild run (or a security-rebuild trigger) bypasses the
          # spec-hash cache-probe in `phpup build cell`. Empty string for
          # every other event type — make ci-cell treats empty FORCE as
          # "do the normal cache-probe".
          FORCE: ${{ inputs.force && '1' || '' }}
        run: make ci-cell OS=${{ matrix.os }} ARCH=${{ matrix.arch }} PHP=${{ matrix.php }} FORCE="$FORCE"
      - name: Upload oci-layout artifact (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: oci-layout-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.php }}
          path: out/oci-layout
          retention-days: 7

  smoke-action:
    name: "Smoke action surface (${{ matrix.os }}/${{ matrix.arch }})"
    needs: pipeline
    # Exercises the public action.yml + src/index.js wrapper end-to-end
    # the way a user's `uses: buildrush/setup-php@v1` would, against the
    # PR's HEAD binary. `runMain()` in src/index.js short-circuits the
    # GitHub-release download when the expected cache path already
    # contains a binary — so we build phpup from the PR and drop it at
    # that exact path *before* invoking `uses: ./`.
    #
    # Matrix is deliberately narrower than `pipeline` (which covers 20
    # OS/arch/PHP combos at the CLI level): the wrapper itself is thin
    # and OS-invariant, so 2 OS × 2 arch × 1 PHP catches wrapper
    # regressions without multiplying CI time.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: jammy
            arch: amd64
            runner: ubuntu-22.04
          - os: noble
            arch: amd64
            runner: ubuntu-24.04
          - os: jammy
            arch: arm64
            runner: ubuntu-22.04-arm
          - os: noble
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Prepare embedded lockfile
        run: cp bundles.lock cmd/phpup/bundles.lock
      - name: Build phpup from PR HEAD into the runner cache
        # src/index.js:runMain() resolves its cached binary path as
        # $RUNNER_TOOL_CACHE/buildrush-bin/phpup (linux) and skips the
        # release-asset download when existsSync() returns true. That's
        # the hook we use to run the wrapper against *this PR's* phpup
        # binary rather than whatever the latest release carries.
        run: |
          mkdir -p "$RUNNER_TOOL_CACHE/buildrush-bin"
          go build -o "$RUNNER_TOOL_CACHE/buildrush-bin/phpup" ./cmd/phpup
          chmod +x "$RUNNER_TOOL_CACHE/buildrush-bin/phpup"
      - name: Invoke action (uses ./)
        uses: ./
        with:
          php-version: "8.4"
          extensions: "redis, intl"
          ini-values: "memory_limit=256M"
      - name: Assert PHP is installed + inputs honored
        run: |
          set -euo pipefail
          php -v
          php -r 'exit(extension_loaded("redis") ? 0 : 1);' \
            || { echo "::error::redis extension not loaded"; exit 1; }
          php -r 'exit(extension_loaded("intl") ? 0 : 1);' \
            || { echo "::error::intl extension not loaded"; exit 1; }
          memlim=$(php -r 'echo ini_get("memory_limit");')
          test "$memlim" = "256M" \
            || { echo "::error::memory_limit=$memlim, want 256M"; exit 1; }
          echo "smoke-action: action surface OK"

  publish:
    name: Publish to GHCR
    needs: [pipeline, smoke-action]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # lockfile update push needs full history
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build phpup
        run: make bin/phpup
      - name: Download all oci-layout artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: oci-layout-*
          path: out/merged-layout
          merge-multiple: true
      - name: Promote to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bin/phpup push \
            --from "oci-layout:$(pwd)/out/merged-layout" \
            --to "ghcr.io/${{ github.repository_owner }}"
      - name: Update lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          bin/phpup lockfile-update \
            -catalog ./catalog \
            -lockfile ./bundles.lock \
            -registry "ghcr.io/$OWNER"
      - name: Commit lockfile (if changed)
        run: |
          git config user.name "buildrush-bot"
          git config user.email "buildrush-bot@users.noreply.github.com"
          git add bundles.lock
          if git diff --cached --quiet; then
            echo "No lockfile changes to commit."
          else
            git commit -m "chore: update bundles.lock"
            git push
          fi
