name: integration-test
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build phpup
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Build binary
        run: |
          cp bundles.lock cmd/phpup/bundles.lock
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o phpup ./cmd/phpup
          rm -f cmd/phpup/bundles.lock
      - uses: actions/upload-artifact@v7
        with:
          name: phpup
          path: phpup
          retention-days: 1

  test:
    name: "Test: ${{ matrix.name }}"
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bare
            extensions: ''
            ini-values: ''
          - name: redis
            extensions: redis
            ini-values: ''
          - name: bundled
            extensions: 'mbstring, intl, curl'
            ini-values: ''
          - name: ini
            extensions: ''
            ini-values: 'memory_limit=512M'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: phpup

      - name: Place binary in tool cache
        run: |
          mkdir -p "$RUNNER_TOOL_CACHE/buildrush-bin"
          cp phpup "$RUNNER_TOOL_CACHE/buildrush-bin/phpup"
          chmod +x "$RUNNER_TOOL_CACHE/buildrush-bin/phpup"

      - name: Setup PHP
        id: setup
        uses: ./
        with:
          php-version: '8.4'
          extensions: ${{ matrix.extensions }}
          ini-values: ${{ matrix.ini-values }}

      - name: Verify PHP version
        run: |
          php -v
          php -v | grep -q "PHP 8.4"

      - name: Verify bundled extensions
        run: |
          for ext in mbstring curl intl zip openssl json pdo sodium gd opcache; do
            php -i | grep -qi "${ext}" || { echo "FAIL: ${ext} not loaded"; exit 1; }
          done

      - name: Verify redis extension
        if: contains(matrix.extensions, 'redis')
        run: |
          php -r 'assert(extension_loaded("redis"));'
          php -i | grep -qi "redis"

      - name: Verify ini values
        if: matrix.ini-values != ''
        run: |
          php -i | grep -q "memory_limit => 512M" || { echo "FAIL: ini value not set"; exit 1; }

      - name: Verify action output
        env:
          PHP_VERSION: ${{ steps.setup.outputs.php-version }}
        run: |
          echo "Resolved version: $PHP_VERSION"
          test -n "$PHP_VERSION"
          [[ "$PHP_VERSION" == 8.4* ]]
