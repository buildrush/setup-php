name: release-action
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X github.com/buildrush/setup-php/internal/version.Version=${VERSION} -X github.com/buildrush/setup-php/internal/version.Commit=${COMMIT} -X github.com/buildrush/setup-php/internal/version.BuildDate=${DATE}"

          cp bundles.lock cmd/phpup/bundles.lock
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/phpup-linux-amd64 ./cmd/phpup
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/planner-linux-amd64 ./cmd/planner
          rm -f cmd/phpup/bundles.lock

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > sha256sums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*
