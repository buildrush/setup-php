name: build-php-core
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      os:
        required: true
        type: string
      arch:
        required: true
        type: string
      ts:
        required: true
        type: string
      spec_hash:
        required: false
        type: string
        default: ''
      push:
        required: false
        type: boolean
        default: true
    outputs:
      digest:
        description: 'OCI digest of the pushed bundle (empty when push=false)'
        value: ${{ jobs.build.outputs.digest }}
      spec_hash:
        description: 'Echoed spec_hash for lockfile update'
        value: ${{ inputs.spec_hash }}

jobs:
  build:
    name: 'core PHP ${{ inputs.version }} (${{ inputs.os }}/${{ inputs.arch }}/${{ inputs.ts }})'
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Install oras
        run: |
          curl -sSfLO "https://github.com/oras-project/oras/releases/download/v1.3.1/oras_1.3.1_linux_amd64.tar.gz"
          tar -xzf oras_1.3.1_linux_amd64.tar.gz -C /usr/local/bin oras

      - name: Build PHP
        env:
          PHP_VERSION: ${{ inputs.version }}
          ARCH: ${{ inputs.arch }}
          WORKSPACE: ${{ github.workspace }}
        run: ./builders/linux/build-php.sh

      - name: Push to GHCR
        id: push
        if: ${{ inputs.push }}
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
          DIGEST=$(cat /tmp/bundle.tar.zst.sha256)
          TAG="${{ inputs.version }}-${{ inputs.os }}-${{ inputs.arch }}-${{ inputs.ts }}"
          oras push \
            --disable-path-validation \
            "ghcr.io/${{ github.repository_owner }}/php-core:${TAG}" \
            --artifact-type application/vnd.buildrush.php-core.v1 \
            /tmp/bundle.tar.zst:application/vnd.oci.image.layer.v1.tar+zstd \
            /tmp/meta.json:application/vnd.buildrush.meta.v1+json
          echo "digest=sha256:$(echo -n "$DIGEST" | sed 's/^sha256://')" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@v3
        if: ${{ inputs.push }}
      - name: Sign bundle
        if: ${{ inputs.push }}
        run: |
          DIGEST=$(cat /tmp/bundle.tar.zst.sha256 | sed 's/^sha256://')
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/php-core@sha256:${DIGEST}"

      - name: Smoke test
        run: |
          mkdir -p /tmp/smoke
          tar --zstd -xf /tmp/bundle.tar.zst -C /tmp/smoke
          /tmp/smoke/usr/local/bin/php -v
          /tmp/smoke/usr/local/bin/php -m

      - name: Upload bundle artifact (PR)
        if: ${{ !inputs.push }}
        uses: actions/upload-artifact@v7
        with:
          name: php-core-${{ inputs.version }}-${{ inputs.os }}-${{ inputs.arch }}-${{ inputs.ts }}
          path: |
            /tmp/bundle.tar.zst
            /tmp/meta.json
          retention-days: 3
