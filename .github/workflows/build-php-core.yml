name: build-php-core
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      os:
        required: true
        type: string
      arch:
        required: true
        type: string
      ts:
        required: true
        type: string
      spec_hash:
        required: false
        type: string
        default: ''
      push:
        required: false
        type: boolean
        default: true
    outputs:
      digest:
        description: 'OCI digest of the pushed bundle (empty when push=false)'
        value: ${{ jobs.build.outputs.digest }}
      spec_hash:
        description: 'Echoed spec_hash for lockfile update'
        value: ${{ inputs.spec_hash }}

jobs:
  build:
    name: 'core PHP ${{ inputs.version }} (${{ inputs.os }}/${{ inputs.arch }}/${{ inputs.ts }})'
    runs-on: ${{ inputs.arch == 'aarch64' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    permissions:
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Install oras
        env:
          ORAS_ARCH: ${{ inputs.arch == 'aarch64' && 'arm64' || 'amd64' }}
        run: |
          curl -sSfLO "https://github.com/oras-project/oras/releases/download/v1.3.1/oras_1.3.1_linux_${ORAS_ARCH}.tar.gz"
          tar -xzf "oras_1.3.1_linux_${ORAS_ARCH}.tar.gz" -C /usr/local/bin oras

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build phpup
        run: make bin/phpup

      # Run the PHP-core build via phpup. phpup docker-wraps
      # builders/linux/build-php.sh unchanged and writes the resulting
      # bundle.tar.zst + meta.json + bundle.tar.zst.sha256 into a
      # project-relative output dir. The subsequent "Stage bundle for
      # publish" step copies them to /tmp/ so "Push to GHCR",
      # "Sign bundle", "Smoke test", and "Upload bundle artifact" keep
      # reading from the same paths they did before this rewiring —
      # preserving the digest job-output contract byte-for-byte.
      - name: Build PHP core via phpup
        env:
          PHP_VERSION: ${{ inputs.version }}
          OS: ${{ inputs.os }}
          ARCH: ${{ inputs.arch }}
          TS: ${{ inputs.ts }}
          PHPUP_OUT_DIR: ${{ github.workspace }}/build/php/${{ inputs.version }}-${{ inputs.os }}-${{ inputs.arch }}-${{ inputs.ts }}
        run: |
          ./bin/phpup build php \
            --php "$PHP_VERSION" \
            --os "$OS" \
            --arch "$ARCH" \
            --ts "$TS" \
            --registry oci-layout:./out/oci-layout \
            --repo . \
            --out-dir "$PHPUP_OUT_DIR"

      - name: Stage bundle for publish
        env:
          PHPUP_OUT_DIR: ${{ github.workspace }}/build/php/${{ inputs.version }}-${{ inputs.os }}-${{ inputs.arch }}-${{ inputs.ts }}
        run: |
          cp "$PHPUP_OUT_DIR/bundle.tar.zst"        /tmp/bundle.tar.zst
          cp "$PHPUP_OUT_DIR/bundle.tar.zst.sha256" /tmp/bundle.tar.zst.sha256
          cp "$PHPUP_OUT_DIR/meta.json"             /tmp/meta.json

      - name: Push to GHCR
        id: push
        if: ${{ inputs.push }}
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
          DIGEST=$(cat /tmp/bundle.tar.zst.sha256)
          TAG="${{ inputs.version }}-${{ inputs.os }}-${{ inputs.arch }}-${{ inputs.ts }}"
          oras push \
            --disable-path-validation \
            "ghcr.io/${{ github.repository_owner }}/php-core:${TAG}" \
            --artifact-type application/vnd.buildrush.php-core.v1 \
            /tmp/bundle.tar.zst:application/vnd.oci.image.layer.v1.tar+zstd \
            /tmp/meta.json:application/vnd.buildrush.meta.v1+json
          echo "digest=sha256:$(echo -n "$DIGEST" | sed 's/^sha256://')" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@v3
        if: ${{ inputs.push }}
      - name: Sign bundle
        if: ${{ inputs.push }}
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          DIGEST=$(cat /tmp/bundle.tar.zst.sha256 | sed 's/^sha256://')
          REF="ghcr.io/${OWNER}/php-core@sha256:${DIGEST}"
          # Retry on Fulcio OIDC transients ("invalid character 'u' looking
          # for beginning of value") — affects ~5-10% of cosign invocations
          # under load. Backoff: 5s, 15s, 30s, 60s, 120s.
          for attempt in 1 2 3 4 5; do
            if cosign sign --yes "$REF"; then
              echo "cosign sign succeeded on attempt $attempt"
              exit 0
            fi
            case "$attempt" in 1) sleep 5;; 2) sleep 15;; 3) sleep 30;; 4) sleep 60;; *) sleep 120;; esac
          done
          echo "::error::cosign sign failed after 5 attempts for $REF"
          exit 1

      - name: Smoke test
        run: |
          mkdir -p /tmp/smoke
          tar --zstd -xf /tmp/bundle.tar.zst -C /tmp/smoke
          /tmp/smoke/usr/local/bin/php -v
          /tmp/smoke/usr/local/bin/php -m

      - name: Upload bundle artifact (PR)
        if: ${{ !inputs.push }}
        uses: actions/upload-artifact@v7
        with:
          name: php-core-${{ inputs.version }}-${{ inputs.os }}-${{ inputs.arch }}-${{ inputs.ts }}
          path: |
            /tmp/bundle.tar.zst
            /tmp/meta.json
          retention-days: 3
