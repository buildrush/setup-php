name: watch-php-releases
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Poll php.net
        id: poll
        run: |
          curl -sSf https://www.php.net/releases/active > /tmp/active.json
          if ! cmp -s /tmp/active.json .state/php-versions.json; then
            cp /tmp/active.json .state/php-versions.json
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit state
        if: steps.poll.outputs.changed == 'true'
        run: |
          git config user.name "buildrush-bot"
          git config user.email "bot@buildrush.dev"
          git add .state/php-versions.json
          git commit -m "chore: observed new PHP release"
          git push
      - name: Dispatch ci.yml for rebuild
        if: steps.poll.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          # force=false — a new upstream PHP release alone doesn't
          # invalidate existing bundles. The .state/ commit above is the
          # canonical signal; this dispatch just lets the pipeline rerun
          # over the latest main (catalog update lands separately).
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              ref: 'main',
              inputs: { force: 'false' },
            });
            core.info('Dispatched ci.yml on main after observing new PHP release');
