name: on-push
on:
  push:
    branches: [main]
    paths: ['catalog/**', 'builders/**']
  pull_request:
    paths: ['catalog/**', 'builders/**']

# Cancel older in-progress runs of this workflow on the same ref so a new push
# supersedes the prior pipeline rather than running alongside it. Prevents
# stuck matrix slots from an older run blocking new work.
concurrency:
  group: on-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/plan-and-build.yml
    with:
      force: false
      push: true
    secrets: inherit
