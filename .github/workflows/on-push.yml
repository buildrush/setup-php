name: on-push
on:
  push:
    branches: [main]
    paths: ['catalog/**', 'builders/**']
  pull_request:
    paths: ['catalog/**', 'builders/**']

jobs:
  pipeline:
    uses: ./.github/workflows/plan-and-build.yml
    with:
      force: false
      push: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
