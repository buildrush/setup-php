name: on-push
on:
  push:
    branches: [main]
    paths: ['catalog/**', 'builders/**']
  pull_request:
    paths: ['catalog/**', 'builders/**']
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

jobs:
  plan:
    uses: ./.github/workflows/plan.yml

  build-php:
    needs: plan
    if: needs.plan.outputs.php_matrix != '{"include":[]}'
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJSON(needs.plan.outputs.php_matrix) }}
    uses: ./.github/workflows/build-php-core.yml
    with:
      version: ${{ matrix.version }}
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      ts: ${{ matrix.ts }}

  build-ext:
    needs: [plan, build-php]
    if: |
      always() &&
      needs.plan.result == 'success' &&
      needs.build-php.result != 'failure' &&
      needs.plan.outputs.ext_matrix != '{"include":[]}'
    strategy:
      fail-fast: false
      max-parallel: 30
      matrix: ${{ fromJSON(needs.plan.outputs.ext_matrix) }}
    uses: ./.github/workflows/build-extension.yml
    with:
      extension: ${{ matrix.extension }}
      ext_version: ${{ matrix.ext_version }}
      php_abi: ${{ matrix.php_abi }}
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}

  update-lock:
    needs: [plan, build-php, build-ext]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.plan.result == 'success' &&
      needs.build-php.result != 'failure' &&
      needs.build-ext.result != 'failure'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Install tools
        run: |
          curl -sSfL -o /tmp/oras.tar.gz "https://github.com/oras-project/oras/releases/download/v1.3.1/oras_1.3.1_linux_amd64.tar.gz"
          sudo tar -xzf /tmp/oras.tar.gz -C /usr/local/bin oras
          pip install pyyaml --quiet
      - name: Update lockfile
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-lockfile.sh
      - uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update bundles.lock"
          title: "chore: update bundles.lock"
          branch: bot/lockfile-update
          delete-branch: true
          body: |
            Automated lockfile update from build pipeline.

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
