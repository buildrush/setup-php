name: ci-lint
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-lint:
    name: Go Lint & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - name: go vet
        run: go vet ./...
      - name: gofmt check
        run: |
          UNFMT=$(gofmt -s -l .)
          if [ -n "$UNFMT" ]; then
            echo "Files need gofmt:"
            echo "$UNFMT"
            exit 1
          fi
      - name: go mod tidy check
        run: |
          cp go.mod go.mod.bak
          cp go.sum go.sum.bak 2>/dev/null || true
          go mod tidy
          diff go.mod go.mod.bak
          diff go.sum go.sum.bak 2>/dev/null || true
      - name: go test
        run: go test -race -cover ./...
      - name: go build
        run: |
          cp bundles.lock cmd/phpup/bundles.lock
          go build ./cmd/phpup
          go build ./cmd/planner
          rm -f cmd/phpup/bundles.lock

  node-lint:
    name: Node.js Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci
      - run: npx eslint src/
      - run: npx prettier --check src/
