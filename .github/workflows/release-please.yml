name: release-please
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          go-version: '1.26'

      - name: Build release binaries
        if: ${{ steps.release.outputs.release_created }}
        env:
          TAG: ${{ steps.release.outputs.tag_name }}
          SHA: ${{ steps.release.outputs.sha }}
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X github.com/buildrush/setup-php/internal/version.Version=${TAG} -X github.com/buildrush/setup-php/internal/version.Commit=${SHA} -X github.com/buildrush/setup-php/internal/version.BuildDate=${DATE}"

          cp bundles.lock cmd/phpup/bundles.lock
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/phpup-linux-amd64 ./cmd/phpup
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/planner-linux-amd64 ./cmd/planner
          rm -f cmd/phpup/bundles.lock

          (cd dist && sha256sum -- * > sha256sums.txt)

      - name: Upload release assets
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: gh release upload "$TAG" dist/* --clobber

      - name: Move floating major tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          case "$TAG" in
            v*.*.*-*) echo "Skipping prerelease $TAG"; exit 0 ;;
          esac
          MAJOR="${TAG%%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$TAG"
          git push origin "$MAJOR" --force

      # The floating major tag must be a git-ref only -- never a GitHub Release.
      # A standalone vN release would hijack src/index.js:resolveReleaseTag and
      # pin consumers to stale assets. Delete one if it somehow exists.
      - name: Ensure no standalone major-tag release exists
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          case "$TAG" in
            v*.*.*-*) exit 0 ;;
          esac
          MAJOR="${TAG%%.*}"
          if gh release view "$MAJOR" --json tagName >/dev/null 2>&1; then
            echo "::warning::Standalone $MAJOR release found; deleting (violates release-artifact contract)"
            gh release delete "$MAJOR" --yes --cleanup-tag=false
          fi

      - name: Run released-lockfile invariant
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go test -tags invariants ./test/invariants/... -v
