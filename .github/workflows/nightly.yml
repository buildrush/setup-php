name: nightly
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/plan-and-build.yml
    with:
      force: false
      push: true
    secrets: inherit

  invariant-check:
    needs: pipeline
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Run released-lockfile invariant
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go test -tags invariants ./test/invariants/... -v
