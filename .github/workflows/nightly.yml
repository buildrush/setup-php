name: nightly
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/plan-and-build.yml
    with:
      force: false
      push: true
    secrets: inherit
