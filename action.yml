name: 'Setup PHP'
description: 'Fast, reproducible PHP setup with prebuilt bundles'
author: 'buildrush'
branding:
  icon: 'box'
  color: 'purple'
inputs:
  php-version:
    description: 'PHP version to set up'
    required: false
    default: '8.4'
  phpts:
    description: "Thread safety ('nts' or 'zts'). Only nts bundles are currently published; zts falls back to nts with a warning (or errors under fail-fast: true)."
    required: false
    default: 'nts'
  extensions:
    description: 'Comma-separated list of PHP extensions to install'
    required: false
  ini-values:
    description: 'Comma-separated list of php.ini values (key=value)'
    required: false
  ini-file:
    description: "Base ini template ('production' or 'development'). Only 'production' is currently supported; other values emit a warning and are ignored."
    required: false
    default: 'production'
  coverage:
    description: 'Coverage driver to set up (xdebug, pcov, none)'
    required: false
    default: 'none'
  tools:
    description: 'Comma-separated list of tools to install'
    required: false
  update:
    description: 'Update pre-installed PHP. No-op under prebuilt bundles; accepted for compatibility with shivammathur/setup-php@v2.'
    required: false
    default: 'false'
  fail-fast:
    description: 'Promote soft fallbacks (e.g. ZTS not available, unsupported tools input) to hard errors.'
    required: false
    default: 'false'
  php-version-file:
    description: 'File containing PHP version'
    required: false
  github-token:
    description: 'GitHub token for authenticated registry access'
    required: false
    default: ${{ github.token }}
  registry:
    description: >
      OCI artifact store used to fetch PHP and extension bundles.
      Defaults to ghcr.io/buildrush. Set to oci-layout:<path> to
      fetch from a local OCI-layout directory (used by local CI).
    required: false
    default: ""
outputs:
  php-version:
    description: 'The installed PHP version'
runs:
  using: 'node20'
  main: 'src/index.js'
