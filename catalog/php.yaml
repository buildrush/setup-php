      - libxml
      - openssl
      - pcntl
      - pcre
      - pdo
      - phar
      - posix
      - random
      - readline
      - reflection
      - session
      - shmop
      - sockets
      - sodium
      - spl
      - standard
      - sysvmsg
      - sysvsem
      - sysvshm
      - tokenizer
      - opcache
      - zlib
    sources:
      url: "https://www.php.net/distributions/php-{version}.tar.xz"
      sig: "https://www.php.net/distributions/php-{version}.tar.xz.asc"
    abi_matrix:
      os: ["linux"]
      arch: ["x86_64"]
      ts: ["nts"]
    configure_flags:
      common: >-
        --enable-mbstring
        --with-curl
        --with-zlib
        --with-openssl
        --enable-bcmath
        --enable-calendar
        --enable-exif
        --enable-ftp
        --enable-intl
        --with-zip
        --enable-soap
        --enable-sockets
        --with-pdo-mysql
        --with-pdo-sqlite
