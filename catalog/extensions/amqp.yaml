name: amqp
kind: pecl
source:
  pecl_package: amqp
versions:
  - '2.2.0'
abi_matrix:
  php: ['8.1', '8.2', '8.3', '8.4', '8.5']
  os: ['linux']
  arch: ['x86_64']
  ts: ['nts']
build_deps:
  linux: ['librabbitmq-dev']
runtime_deps:
  linux: ['librabbitmq4']
ini:
  - 'extension=amqp'
smoke:
  - 'php -r "assert(extension_loaded(\"amqp\"));"'
