name: imagick
kind: pecl
source:
  pecl_package: imagick
versions:
  - '3.8.1'
abi_matrix:
  php: ['8.1', '8.2', '8.3', '8.4', '8.5']
  os: ['linux']
  arch: ['x86_64', 'aarch64']
  ts: ['nts']
build_deps:
  linux: ['libmagickwand-dev', 'libmagickcore-dev']
# Runtime deps cover the transitive system libs that libMagickCore/Wand link
# against but whose SOVERSION does NOT drift between jammy and noble. The
# drifty trio (MagickWand/Core/ltdl) is captured into the bundle instead via
# hermetic_libs below.
runtime_deps:
  linux:
    - libfontconfig1
    - libx11-6
    - libxext6
    - liblcms2-2
    - liblqr-1-0
    - libfftw3-double3
    - libbz2-1.0
hermetic_libs:
  - libMagickWand-6.Q16.so.*
  - libMagickCore-6.Q16.so.*
  - libltdl.so.*
ini:
  - 'extension=imagick'
smoke:
  - 'php -r "assert(extension_loaded(\"imagick\"));"'
