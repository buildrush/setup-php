name: imagick
kind: pecl
source:
  pecl_package: imagick
versions:
  - '3.8.1'
abi_matrix:
  php: ['8.1', '8.2', '8.3', '8.4', '8.5']
  os: ['linux']
  arch: ['x86_64', 'aarch64']
  ts: ['nts']
build_deps:
  linux: ['libmagickwand-dev', 'libmagickcore-dev']
runtime_deps:
  linux: []
hermetic_libs:
  - libMagickWand-6.Q16.so.*
  - libMagickCore-6.Q16.so.*
  - libltdl.so.*
ini:
  - 'extension=imagick'
smoke:
  - 'php -r "assert(extension_loaded(\"imagick\"));"'
