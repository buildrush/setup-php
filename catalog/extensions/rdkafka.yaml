name: rdkafka
kind: pecl
source:
  pecl_package: rdkafka
versions:
  - '6.0.5'
abi_matrix:
  php: ['8.1', '8.2', '8.3', '8.4', '8.5']
  os: ['linux']
  arch: ['x86_64']
  ts: ['nts']
build_deps:
  linux: ['librdkafka-dev']
runtime_deps:
  linux: ['librdkafka1']
ini:
  - 'extension=rdkafka'
smoke:
  - 'php -r "assert(extension_loaded(\"rdkafka\"));"'
