name: protobuf
kind: pecl
source:
  pecl_package: protobuf
versions:
  - '5.34.1'
abi_matrix:
  php: ['8.1', '8.2', '8.3', '8.4', '8.5']
  os: ['linux']
  arch: ['x86_64', 'aarch64']
  ts: ['nts']
exclude:
  - { php: '8.1' }
build_deps:
  linux: []
runtime_deps:
  linux: []
ini:
  - 'extension=protobuf'
smoke:
  - 'php -r "assert(extension_loaded(\"protobuf\"));"'
