name: ssh2
kind: pecl
source:
  pecl_package: ssh2
versions:
  - '1.5.0'
abi_matrix:
  php: ['8.1', '8.2', '8.3', '8.4', '8.5']
  os: ['linux']
  arch: ['x86_64']
  ts: ['nts']
build_deps:
  linux: ['libssh2-1-dev']
runtime_deps:
  linux: ['libssh2-1']
ini:
  - 'extension=ssh2'
smoke:
  - 'php -r "assert(extension_loaded(\"ssh2\"));"'
