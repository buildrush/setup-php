name: mongodb
kind: pecl
source:
  pecl_package: mongodb
versions:
  - '2.2.1'
abi_matrix:
  php: ['8.1', '8.2', '8.3', '8.4', '8.5']
  os: ['linux']
  arch: ['x86_64', 'aarch64']
  ts: ['nts']
build_deps:
  linux: ['libssl-dev', 'libsasl2-dev']
runtime_deps:
  linux: ['libssl3t64', 'libsasl2-2']
ini:
  - 'extension=mongodb'
smoke:
  - 'php -r "assert(extension_loaded(\"mongodb\"));"'
