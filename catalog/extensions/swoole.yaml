name: swoole
kind: pecl
source:
  pecl_package: swoole
versions:
  - '6.2.0'
abi_matrix:
  php: ['8.1', '8.2', '8.3', '8.4', '8.5']
  os: ['linux']
  arch: ['x86_64']
  ts: ['nts']
exclude:
  # swoole 6.2.0 declares <min>8.2.0</min> in PECL package.xml.
  - { php: '8.1' }
build_deps:
  linux: ['libssl-dev', 'libcurl4-openssl-dev']
runtime_deps:
  linux: ['libssl3t64', 'libcurl4t64']
ini:
  - 'extension=swoole'
smoke:
  - 'php -r "assert(extension_loaded(\"swoole\"));"'
