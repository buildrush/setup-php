name: yaml
kind: pecl
source:
  pecl_package: yaml
versions:
  - '2.3.0'
abi_matrix:
  php: ['8.1', '8.2', '8.3', '8.4', '8.5']
  os: ['linux']
  arch: ['x86_64']
  ts: ['nts']
build_deps:
  linux: ['libyaml-dev']
runtime_deps:
  linux: ['libyaml-0-2']
ini:
  - 'extension=yaml'
smoke:
  - 'php -r "assert(extension_loaded(\"yaml\"));"'
