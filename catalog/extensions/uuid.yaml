name: uuid
kind: pecl
source:
  pecl_package: uuid
versions:
  - '1.3.0'
abi_matrix:
  php: ['8.1', '8.2', '8.3', '8.4', '8.5']
  os: ['linux']
  arch: ['x86_64']
  ts: ['nts']
build_deps:
  linux: ['uuid-dev']
runtime_deps:
  linux: ['libuuid1']
ini:
  - 'extension=uuid'
smoke:
  - 'php -r "assert(extension_loaded(\"uuid\"));"'
