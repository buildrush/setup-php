name: event
kind: pecl
source:
  pecl_package: event
versions:
  - '3.1.4'
abi_matrix:
  php: ['8.1', '8.2', '8.3', '8.4', '8.5']
  os: ['linux']
  arch: ['x86_64', 'aarch64']
  ts: ['nts']
build_deps:
  linux: ['libevent-dev', 'libssl-dev']
runtime_deps:
  linux: ['libevent-2.1-7', 'libevent-openssl-2.1-7']
ini:
  - 'extension=event'
smoke:
  - 'php -r "assert(extension_loaded(\"event\"));"'
