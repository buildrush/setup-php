# test/compat/fixtures.yaml
# Each fixture feeds a matrix cell in compat-harness.yml. Field names match
# shivammathur/setup-php@v2 inputs (php-version, extensions, ini-values, coverage).
# Keep this sorted by 'name' so matrix iteration order is deterministic.

fixtures:
  - name: bare
    php-version: '8.4'
    extensions: ''
    ini-values: ''
    coverage: 'none'

  - name: exclusion
    php-version: '8.4'
    extensions: ':opcache'
    ini-values: ''
    coverage: 'none'

  - name: coverage-pcov
    php-version: '8.4'
    extensions: ''
    ini-values: ''
    coverage: 'pcov'

  - name: ini-and-coverage
    php-version: '8.4'
    extensions: ''
    ini-values: 'memory_limit=256M,date.timezone=UTC'
    coverage: 'xdebug'

  - name: ini-file-development
    php-version: '8.4'
    extensions: ''
    ini-values: ''
    coverage: 'none'
    ini-file: 'development'

  - name: multi-ext
    php-version: '8.4'
    extensions: 'redis, xdebug'
    ini-values: ''
    coverage: 'none'

  - name: none-reset
    php-version: '8.4'
    extensions: 'none, redis'
    ini-values: ''
    coverage: 'none'

  - name: single-ext
    php-version: '8.4'
    extensions: 'redis'
    ini-values: ''
    coverage: 'none'

  - name: bare-85
    php-version: '8.5'
    extensions: ''
    ini-values: ''
    coverage: 'none'

  - name: coverage-pcov-85
    php-version: '8.5'
    extensions: ''
    ini-values: ''
    coverage: 'pcov'

  - name: exclusion-85
    php-version: '8.5'
    extensions: ':opcache'
    ini-values: ''
    coverage: 'none'

  - name: ini-and-coverage-85
    php-version: '8.5'
    extensions: ''
    ini-values: 'memory_limit=256M,date.timezone=UTC'
    coverage: 'xdebug'

  - name: ini-file-development-85
    php-version: '8.5'
    extensions: ''
    ini-values: ''
    coverage: 'none'
    ini-file: 'development'

  # redis is excluded on 8.5 (see catalog/extensions/redis.yaml); these three
  # fixtures substitute apcu to cover the same input-shape axes (multi-ext,
  # none-reset, single-ext) against an extension that does build on 8.5.
  - name: multi-ext-85
    php-version: '8.5'
    extensions: 'apcu, xdebug'
    ini-values: ''
    coverage: 'none'

  - name: none-reset-85
    php-version: '8.5'
    extensions: 'none, apcu'
    ini-values: ''
    coverage: 'none'

  - name: single-ext-85
    php-version: '8.5'
    extensions: 'apcu'
    ini-values: ''
    coverage: 'none'
