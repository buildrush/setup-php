# test/compat/fixtures.yaml
# Each fixture feeds a matrix cell in compat-harness.yml. Field names match
# shivammathur/setup-php@v2 inputs (php-version, extensions, ini-values, coverage).
# Keep this sorted by 'name' so matrix iteration order is deterministic.

fixtures:
  - name: bare
    php-version: '8.4'
    extensions: ''
    ini-values: ''
    coverage: 'none'

  - name: exclusion
    php-version: '8.4'
    extensions: ':opcache'
    ini-values: ''
    coverage: 'none'

  - name: coverage-pcov
    php-version: '8.4'
    extensions: ''
    ini-values: ''
    coverage: 'pcov'

  - name: ini-and-coverage
    php-version: '8.4'
    extensions: ''
    ini-values: 'memory_limit=256M,date.timezone=UTC'
    coverage: 'xdebug'

  - name: multi-ext
    php-version: '8.4'
    extensions: 'redis, xdebug'
    ini-values: ''
    coverage: 'none'

  - name: none-reset
    php-version: '8.4'
    extensions: 'none, redis'
    ini-values: ''
    coverage: 'none'

  - name: single-ext
    php-version: '8.4'
    extensions: 'redis'
    ini-values: ''
    coverage: 'none'
